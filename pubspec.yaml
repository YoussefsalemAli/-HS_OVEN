name: h_oven
description: H Oven - Artisan Cinnamon Rolls & Cookies
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  url_launcher: ^6.2.4
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
        - asset: fonts/Cairo-Bold.ttf
          weight: 700
        - asset: fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: fonts/Cairo-Light.ttf
          weight: 300
        - asset: fonts/Cairo-Medium.ttf
          weight: 500
        - asset: fonts/Cairo-Black.ttf
          weight: 900
        - asset: fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: fonts/Cairo-ExtraLight.ttf
          weight: 200
